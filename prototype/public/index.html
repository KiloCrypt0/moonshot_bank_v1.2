<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Moonshot Bank</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/2.0.0/index.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2332;
      --bg-hover: #243044;
      --border: #2a3a4e;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --purple: #a855f7;
      --stellar-blue: #4c6ef5;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--stellar-blue), var(--purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .search-container {
      flex: 1;
      max-width: 600px;
      margin: 0 32px;
    }

    .search-box {
      width: 100%;
      display: flex;
      gap: 8px;
    }

    .search-box input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--accent-light); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--bg-hover); }

    .network-badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .network-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .network-toggle {
      display: flex;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
    }

    .network-option {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .network-option.active {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .network-option .net-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .network-option.active .net-dot.mainnet { background: var(--green); }
    .network-option.active .net-dot.testnet { background: var(--yellow); }

    .wallet-btn {
      background: linear-gradient(135deg, var(--stellar-blue), var(--purple));
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .wallet-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .wallet-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .wallet-btn.connected {
      background: var(--bg-card);
      border: 1px solid var(--green);
      color: var(--green);
    }

    .wallet-icon {
      width: 18px;
      height: 18px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .or-divider {
      color: var(--text-muted);
      font-size: 12px;
      padding: 0 4px;
    }

    /* ── Main Layout ───────────────────────────────────────── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }

    /* ── Welcome State ─────────────────────────────────────── */
    .welcome {
      text-align: center;
      padding: 100px 20px;
    }

    .welcome h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--text-primary), var(--stellar-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 18px;
      margin-bottom: 40px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .example-addresses {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .example-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      font-family: 'SF Mono', monospace;
      transition: all 0.2s;
    }

    .example-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    /* ── Loading State ─────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error State ───────────────────────────────────────── */
    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      color: var(--red);
      font-size: 14px;
    }

    /* ── Time Travel Date Picker ─────────────────────────────── */
    .time-travel-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .time-travel-bar label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }
    .time-travel-bar input[type="datetime-local"] {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .time-travel-bar input[type="datetime-local"]:focus {
      border-color: var(--accent);
    }
    .time-travel-bar input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
    .time-travel-bar .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-weight: 500;
    }
    .time-travel-bar .btn-go {
      background: var(--accent);
      color: white;
    }
    .time-travel-bar .btn-go:hover { background: var(--accent-light); }
    .time-travel-bar .btn-back-to-live {
      background: var(--bg-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .time-travel-bar .btn-back-to-live:hover { color: var(--text-primary); }
    .time-travel-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
    }
    .time-travel-badge.live {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }
    .time-travel-badge.historical {
      background: rgba(234, 179, 8, 0.15);
      color: var(--yellow);
    }
    .time-travel-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* ── Time Travel Date Picker ─────────────────────────────── */
    .time-travel-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .time-travel-bar label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }
    .time-travel-bar input[type="datetime-local"] {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .time-travel-bar input[type="datetime-local"]:focus {
      border-color: var(--accent);
    }
    .time-travel-bar input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
    .time-travel-bar .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-weight: 500;
    }
    .time-travel-bar .btn-go {
      background: var(--accent);
      color: white;
    }
    .time-travel-bar .btn-go:hover { background: var(--accent-light); }
    .time-travel-bar .btn-back-to-live {
      background: var(--bg-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .time-travel-bar .btn-back-to-live:hover { color: var(--text-primary); }
    .time-travel-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
    }
    .time-travel-badge.live {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }
    .time-travel-badge.historical {
      background: rgba(234, 179, 8, 0.15);
      color: var(--yellow);
    }
    .time-travel-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* ── Portfolio Header ──────────────────────────────────── */
    .portfolio-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .portfolio-address {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      word-break: break-all;
    }

    .portfolio-value {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 4px;
    }

    .portfolio-change {
      font-size: 15px;
      font-weight: 500;
    }

    .portfolio-change.positive { color: var(--green); }
    .portfolio-change.negative { color: var(--red); }

    .portfolio-meta {
      display: flex;
      gap: 24px;
      margin-top: 12px;
    }

    .meta-item {
      font-size: 13px;
      color: var(--text-muted);
    }

    .meta-item span { color: var(--text-secondary); font-weight: 500; }

    /* ── Stats Cards ───────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Tabs ──────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text-secondary); }
    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }

    .tab-count {
      background: var(--bg-hover);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      margin-left: 6px;
    }

    /* ── Token List ────────────────────────────────────────── */
    .token-list { display: flex; flex-direction: column; gap: 2px; }

    .token-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-card);
      border-radius: var(--radius);
      transition: background 0.15s;
      cursor: default;
    }

    .token-row:hover { background: var(--bg-hover); }

    .token-row-header {
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 8px 20px;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: none;
    }

    .token-row-header:hover { background: none; }

    .token-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .token-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .token-icon.xlm { background: linear-gradient(135deg, #4c6ef5, #7c3aed); }
    .token-icon.usdc { background: linear-gradient(135deg, #2775ca, #3b82f6); color: white; }
    .token-icon.lp { background: linear-gradient(135deg, #059669, #22c55e); }
    .token-icon.default { background: var(--bg-hover); color: var(--text-secondary); }

    .token-name { font-weight: 600; font-size: 15px; }
    .token-issuer {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
      margin-top: 2px;
    }

    .token-balance { font-weight: 500; text-align: right; }
    .token-balance-sub { font-size: 12px; color: var(--text-muted); }

    .token-price { text-align: right; font-size: 14px; }
    .token-price-change { font-size: 12px; margin-top: 2px; }
    .token-price-change.positive { color: var(--green); }
    .token-price-change.negative { color: var(--red); }

    .token-value {
      text-align: right;
      font-weight: 600;
      font-size: 15px;
    }

    /* ── Wallet Panel ─────────────────────────────────────── */
    .wallet-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .wallet-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .wallet-panel-title {
      font-size: 16px;
      font-weight: 700;
    }

    .wallet-panel-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .wallet-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .wallet-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .wallet-item:hover { background: var(--bg-hover); border-color: var(--accent); }
    .wallet-item.active { border-color: var(--accent); background: rgba(99,102,241,0.08); }

    .wallet-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .wallet-item-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .wallet-item-info {
      min-width: 0;
    }

    .wallet-item-label {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wallet-item-address {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .wallet-item-right {
      text-align: right;
      flex-shrink: 0;
    }

    .wallet-item-value {
      font-weight: 600;
      font-size: 14px;
    }

    .wallet-item-assets {
      font-size: 11px;
      color: var(--text-muted);
    }

    .wallet-item-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      opacity: 0;
      transition: all 0.2s;
    }

    .wallet-item:hover .wallet-item-remove { opacity: 1; }
    .wallet-item-remove:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    .wallet-add-form {
      display: flex;
      gap: 8px;
    }

    .wallet-add-form input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }

    .wallet-add-form input:focus { border-color: var(--accent); }

    .wallet-add-form .btn { padding: 10px 16px; font-size: 13px; }

    .wallet-view-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .view-toggle-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-toggle-btn:hover { color: var(--text-secondary); }
    .view-toggle-btn.active {
      color: var(--text-primary);
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ── Aggregate Header ─────────────────────────────────── */
    .agg-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .agg-total {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 4px;
    }

    .agg-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .agg-wallet-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .agg-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .agg-chip:hover { border-color: var(--accent); }

    .agg-chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .unpriced {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .soroban-badge {
      display: inline-block;
      background: rgba(168, 85, 247, 0.15);
      color: var(--purple);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ── DeFi Positions ────────────────────────────────────── */
    .defi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 8px;
    }

    .defi-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .defi-protocol {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .defi-protocol-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }

    .defi-protocol-icon.sushi { background: linear-gradient(135deg, #d946ef, #f97316); }
    .defi-protocol-icon.solv { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .defi-protocol-icon.default { background: var(--bg-hover); }

    .defi-type-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .defi-type-badge.concentrated_lp { background: rgba(99,102,241,0.15); color: var(--accent-light); }
    .defi-type-badge.vault { background: rgba(34,197,94,0.15); color: var(--green); }
    .defi-type-badge.staking { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .defi-type-badge.lp { background: rgba(59,130,246,0.15); color: var(--blue); }

    .defi-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .defi-detail-item {
      font-size: 13px;
    }

    .defi-detail-label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .defi-detail-value {
      font-weight: 600;
    }

    .in-range { color: var(--green); }
    .out-of-range { color: var(--red); }

    /* ── Transaction History ────────────────────────────────── */
    .tx-list { display: flex; flex-direction: column; gap: 2px; }

    .tx-row {
      display: grid;
      grid-template-columns: 120px 1fr 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      background: var(--bg-card);
      border-radius: var(--radius);
      font-size: 14px;
    }

    .tx-type {
      font-weight: 600;
      font-size: 13px;
      text-transform: capitalize;
      padding: 4px 10px;
      border-radius: 6px;
      text-align: center;
    }

    .tx-type.payment { background: rgba(59,130,246,0.15); color: var(--blue); }
    .tx-type.create_account { background: rgba(34,197,94,0.15); color: var(--green); }
    .tx-type.change_trust { background: rgba(168,85,247,0.15); color: var(--purple); }
    .tx-type.manage_sell_offer, .tx-type.manage_buy_offer { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .tx-type.path_payment_strict_receive, .tx-type.path_payment_strict_send { background: rgba(99,102,241,0.15); color: var(--accent-light); }
    .tx-type.default { background: var(--bg-hover); color: var(--text-secondary); }

    .tx-details { color: var(--text-secondary); font-size: 13px; }
    .tx-details strong { color: var(--text-primary); }
    .tx-amount { font-weight: 600; text-align: right; }
    .tx-time { color: var(--text-muted); font-size: 12px; text-align: right; white-space: nowrap; }

    /* ── Claimable Balances ─────────────────────────────────── */
    .claim-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-card);
      border-radius: var(--radius);
    }

    .claim-asset { font-weight: 600; }
    .claim-sponsor { font-size: 13px; color: var(--text-muted); font-family: monospace; }
    .claim-amount { font-weight: 600; text-align: right; }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    /* ── NFT gallery ────────────────────────────────────────── */
    .nft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }
    .nft-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, border-color 0.15s;
    }
    .nft-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .nft-card-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: var(--bg-secondary);
      display: block;
    }
    .nft-card-image-fallback {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, var(--bg-hover), var(--bg-secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .nft-card-body {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nft-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .nft-card-code {
      font-size: 11px;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .nft-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .nft-confidence {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .nft-confidence.high { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .nft-confidence.med  { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .nft-confidence.low  { background: rgba(100, 116, 139, 0.15); color: var(--text-muted); }

    /* ── Portfolio breakdown bar ────────────────────────────── */
    .breakdown-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 32px;
      gap: 2px;
    }

    .breakdown-segment {
      height: 100%;
      border-radius: 4px;
      min-width: 4px;
      transition: all 0.3s;
    }

    .breakdown-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    /* ── Pie Chart ──────────────────────────────────────────── */
    .pie-chart-section {
      display: flex;
      gap: 32px;
      align-items: center;
      margin-bottom: 32px;
      padding: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .pie-chart-section h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 16px 0;
    }

    .pie-canvas-wrap {
      flex-shrink: 0;
      position: relative;
    }

    .pie-canvas-wrap canvas {
      display: block;
      cursor: default;
    }

    .pie-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .pie-legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pie-legend-label {
      flex: 1;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .pie-legend-value {
      color: var(--text-primary);
      font-weight: 600;
      flex-shrink: 0;
    }

    .pie-legend-pct {
      color: var(--text-muted);
      min-width: 42px;
      text-align: right;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .pie-chart-section { flex-direction: column; align-items: flex-start; }
    }

    /* ── Portfolio Chart ───────────────────────────────────── */
    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .chart-title {
      font-size: 18px;
      font-weight: 700;
    }

    .chart-change {
      font-size: 14px;
      font-weight: 500;
    }

    .chart-range-btns {
      display: flex;
      gap: 4px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .range-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .range-btn:hover { color: var(--text-secondary); }
    .range-btn.active {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .chart-canvas-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    .chart-canvas-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .chart-tooltip {
      position: absolute;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      font-size: 13px;
      white-space: nowrap;
      display: none;
      z-index: 10;
    }

    .chart-tooltip-value {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 2px;
    }

    .chart-tooltip-time {
      color: var(--text-muted);
      font-size: 11px;
    }

    .chart-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .chart-stat {
      text-align: center;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: 8px;
    }

    .chart-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .chart-stat-value {
      font-weight: 700;
      font-size: 16px;
    }

    .chart-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .chart-empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .tracking-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: var(--green);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .tracking-badge.inactive {
      background: rgba(100,116,139,0.1);
      border-color: rgba(100,116,139,0.2);
      color: var(--text-muted);
    }

    /* ── Space Background ──────────────────────────────────── */
    @keyframes twinkle { 0%,100%{opacity:.6} 50%{opacity:.1} }
    .star { position:absolute; border-radius:50%; background:white; animation:twinkle var(--d,2s) infinite; }

    /* ── Whale Leaderboard ─────────────────────────────────── */
    .whale-section {
      margin-top: 48px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .whale-section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .whale-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .whale-table th {
      padding: 10px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .whale-table td {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .whale-table tr:last-child td { border-bottom: none; }
    .whale-table tr { cursor: pointer; }
    .whale-table tr:hover td { background: var(--bg-hover); }
    .whale-address a { color: var(--accent-light); text-decoration: none; }
    .whale-address a:hover { text-decoration: underline; }

    .whale-rank {
      font-weight: 700;
      color: var(--accent-light);
      width: 40px;
    }

    .whale-address {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .whale-balance {
      text-align: right;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── Featured NFT ──────────────────────────────────────── */
    .featured-nft-section {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .featured-nft-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    #featured-nft {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
      .search-container { margin: 0; order: 3; max-width: 100%; width: 100%; }
      .main { padding: 16px; }
      .portfolio-value { font-size: 32px; }
      .token-row { grid-template-columns: 1.5fr 1fr 1fr; }
      .token-row-header .price-col { display: none; }
      .token-price { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

        </button>
        <button class="wallet-btn" onclick="connectFreighter()" style="padding: 14px 32px; font-size: 16px; border-radius: 16px;">
          <svg class="wallet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px">
            <rect x="2" y="6" width="20" height="12" rx="2"></rect>
            <path d="M22 10H2"></path>
            <path d="M6 14h.01"></path>
          </svg>
          Connect Freighter
        </button>
      </div>


      <div class="whale-section">
        <div class="whale-section-title">🐋🪐 Top XLM Whales</div>
        <table class="whale-table" id="whaleTable">
          <thead>
            <tr>
              <th class="whale-rank">#</th>
              <th>Address</th>
              <th style="text-align:right">XLM Balance</th>
              <th style="text-align:right">Assets</th>
            </tr>
          </thead>
          <tbody id="whaleTableBody">
            <tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:20px;">Loading whales...</td></tr>
          </tbody>
        </table>
      </div>

      <div style="margin-top:32px;text-align:center;">
        <img src="/moonshot-mascot.png" alt="Moonshot mascot" style="width:480px;max-width:90%;border-radius:20px;opacity:0.75;" />
      </div>

    </div>
  </div>

  <script>
    // ── Go Home ───────────────────────────────────────────────
    function goHome() {
      location.reload();
    }

    function lookUpWhale(address) {
      document.getElementById('addressInput').value = address;
      loadPortfolio();
    }

    // ── State ──────────────────────────────────────────────────
    let currentData = null;
    let currentTab = "tokens";
    let historyData = null;
    let claimableData = null;
    let nftsData = null;
    let portfolioHistory = null;
    let portfolioHistoryRange = "30d";
    let freighterConnected = false;
    let freighterAddress = null;
    const currentNetwork = "mainnet"; // Mainnet only — read-only protocol

    // Multi-wallet state
    let walletList = [];           // Array of { address, label, network, totalValueUSD, ... }
    let portfolioData = null;      // Aggregated portfolio response
    let activeView = "all";        // "all" or a specific wallet address
    let multiWalletMode = false;   // Whether we're in portfolio mode
    let timeTravelDate = null;      // null = live, ISO string = historical
    let timeTravelSnapshot = null;  // Snapshot data when viewing historical

    const API_BASE = window.location.origin;
    const WELCOME_HTML = document.getElementById("app").innerHTML; // Save initial welcome screen

    const WALLET_COLORS = [
      "linear-gradient(135deg, #6366f1, #8b5cf6)",
      "linear-gradient(135deg, #3b82f6, #06b6d4)",
      "linear-gradient(135deg, #22c55e, #16a34a)",
      "linear-gradient(135deg, #f59e0b, #ef4444)",
      "linear-gradient(135deg, #ec4899, #a855f7)",
      "linear-gradient(135deg, #14b8a6, #3b82f6)",
      "linear-gradient(135deg, #f97316, #eab308)",
      "linear-gradient(135deg, #8b5cf6, #ec4899)",
    ];

    function getWalletColor(index) {
      return WALLET_COLORS[index % WALLET_COLORS.length];
    }

    // Network is always mainnet (read-only protocol, no need for testnet)

    // ── Freighter Wallet ──────────────────────────────────────
    async function connectFreighter() {
      const btn = document.getElementById("freighterBtn");

      // If already connected, disconnect
      if (freighterConnected) {
        freighterConnected = false;
        freighterAddress = null;
        btn.className = "wallet-btn";
        btn.innerHTML = `
          <svg class="wallet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="12" rx="2"></rect>
            <path d="M22 10H2"></path>
            <path d="M6 14h.01"></path>
          </svg>
          Connect Freighter
        `;
        return;
      }

      btn.disabled = true;
      btn.textContent = "Connecting...";

      try {
        // Check if Freighter extension is installed
        if (typeof window.freighterApi !== "undefined") {
          // Request access first
          if (window.freighterApi.requestAccess) {
            await window.freighterApi.requestAccess();
          } else if (window.freighterApi.setAllowed) {
            await window.freighterApi.setAllowed();
          }

          // Get the public key — try all known method names
          if (window.freighterApi.getPublicKey) {
            freighterAddress = await window.freighterApi.getPublicKey();
          } else if (window.freighterApi.getAddress) {
            const addrResult = await window.freighterApi.getAddress();
            freighterAddress = typeof addrResult === "string" ? addrResult : addrResult.address;
          } else if (window.freighterApi.requestPublicKey) {
            freighterAddress = await window.freighterApi.requestPublicKey();
          }

          // Handle wrapped responses (some versions return {publicKey: "G..."})
          if (freighterAddress && typeof freighterAddress === "object") {
            freighterAddress = freighterAddress.publicKey || freighterAddress.address || null;
          }

          // Network is always mainnet
        } else {
          // Freighter not installed — try detecting via window message
          // Give a helpful error
          throw new Error("NOT_INSTALLED");
        }

        if (!freighterAddress) throw new Error("No address returned");

        freighterConnected = true;
        btn.disabled = false;
        btn.className = "wallet-btn connected";
        btn.innerHTML = `
          <svg class="wallet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          ${freighterAddress.slice(0, 4)}...${freighterAddress.slice(-4)}
        `;

        // Auto-add to portfolio and enter portfolio mode
        document.getElementById("addressInput").value = freighterAddress;
        await addWalletToPortfolio(freighterAddress, "Freighter Wallet");
        await enterPortfolioMode();

      } catch (e) {
        btn.disabled = false;
        btn.className = "wallet-btn";

        if (e.message === "NOT_INSTALLED") {
          btn.innerHTML = `
            <svg class="wallet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="2"></rect>
              <path d="M22 10H2"></path>
              <path d="M6 14h.01"></path>
            </svg>
            Connect Freighter
          `;
          // Open Freighter install page
          if (confirm("Freighter wallet extension not detected.\\n\\nWould you like to install it?")) {
            window.open("https://www.freighter.app/", "_blank");
          }
        } else {
          console.error("Freighter connection error:", e);
          btn.innerHTML = `
            <svg class="wallet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="2"></rect>
              <path d="M22 10H2"></path>
              <path d="M6 14h.01"></path>
            </svg>
            Connect Freighter
          `;
          alert("Failed to connect: " + e.message);
        }
      }
    }

    // ── Load Whale Leaderboard ────────────────────────────────
    async function loadWhales() {
      const tbody = document.getElementById("whaleTableBody");
      if (!tbody) return;
      try {
        const res = await fetch(`${API_BASE}/api/v1/whales`);
        if (!res.ok) throw new Error("Failed to fetch");
        const data = await res.json();
        const whales = data.whales || [];
        if (whales.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-muted); padding:20px;">No data available</td></tr>';
          return;
        }
        tbody.innerHTML = whales.map((w, i) => {
          const shortAddr = w.address ? w.address.slice(0, 6) + "..." + w.address.slice(-4) : "—";
          const balM = w.balance ? (w.balance >= 1_000_000_000
            ? (w.balance / 1_000_000_000).toLocaleString("en-US", { maximumFractionDigits: 1 }) + "B XLM"
            : (w.balance / 1_000_000).toLocaleString("en-US", { maximumFractionDigits: 0 }) + "M XLM") : "—";
          const assets = w.assetCount != null ? w.assetCount : "—";
          return `<tr onclick="lookUpWhale('${w.address}')">
            <td class="whale-rank">#${i + 1}</td>
            <td class="whale-address"><a href="#" onclick="event.preventDefault()">${shortAddr}</a></td>
            <td class="whale-balance">${balM}</td>
            <td class="whale-balance">${assets}</td>
          </tr>`;
        }).join("");
      } catch (e) {
        if (tbody) tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--red); padding:20px;">Failed to load whale data</td></tr>';
      }
    }

    // Auto-detect Freighter and auto-load portfolio on page load
    window.addEventListener("load", () => {
      setTimeout(async () => {
        const hasFreighter = typeof window.freighterApi !== "undefined" || typeof freighterApi !== "undefined";
        if (hasFreighter) {
          console.log("Freighter wallet detected");
        }

        // Load whale leaderboard on welcome page
        loadWhales();
      }, 500);
    });

    // ── Multi-Wallet Management ────────────────────────────────

    async function loadWalletList() {
      try {
        const res = await fetch(`${API_BASE}/api/v1/wallets`);
        if (!res.ok) throw new Error("Failed to load wallets");
        const data = await res.json();
        walletList = data.wallets || [];
        return walletList;
      } catch (e) {
        console.error("Load wallet list error:", e);
        return [];
      }
    }

    async function addWalletToPortfolio(address, label) {
      if (!address || !address.startsWith("G") || address.length !== 56) {
        alert("Invalid Stellar address");
        return false;
      }
      try {
        const res = await fetch(`${API_BASE}/api/v1/wallets`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ address, network: currentNetwork, label: label || null }),
        });
        if (!res.ok) throw new Error("Failed to add wallet");
        const data = await res.json();
        walletList = data.wallets || [];
        return true;
      } catch (e) {
        alert("Failed to add wallet: " + e.message);
        return false;
      }
    }

    async function removeWalletFromPortfolio(address, evt) {
      if (evt) evt.stopPropagation();
      if (!confirm("Remove this wallet from your portfolio?")) return;
      try {
        const res = await fetch(`${API_BASE}/api/v1/wallets/${address}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Failed to remove wallet");
        const data = await res.json();
        walletList = data.wallets || [];
        await loadMultiWalletPortfolio();
      } catch (e) {
        alert("Failed to remove: " + e.message);
      }
    }

    async function handleAddWallet() {
      const input = document.getElementById("walletAddInput");
      const labelInput = document.getElementById("walletLabelInput");
      const address = input.value.trim();
      const label = labelInput ? labelInput.value.trim() : "";

      if (await addWalletToPortfolio(address, label)) {
        input.value = "";
        if (labelInput) labelInput.value = "";
        await loadMultiWalletPortfolio();
      }
    }

    async function loadMultiWalletPortfolio() {
      multiWalletMode = true;
      const app = document.getElementById("app");

      // Show loading
      app.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div style="color: var(--text-secondary);">Loading portfolio...</div>
          <div style="color: var(--text-muted); font-size: 13px; margin-top: 8px;">${walletList.length} wallet${walletList.length !== 1 ? "s" : ""}</div>
        </div>
      `;

      try {
        const addresses = walletList.map((w) => w.address);
        const res = await fetch(`${API_BASE}/api/v1/portfolio`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ addresses }),
        });
        if (!res.ok) throw new Error("Failed to load portfolio");
        portfolioData = await res.json();
        renderMultiWalletView();
      } catch (e) {
        app.innerHTML = `
          <div class="error-banner">${e.message}</div>
          <div style="text-align:center; padding: 40px;">
            <button class="btn" onclick="enterPortfolioMode()">Try again</button>
          </div>
        `;
      }
    }

    function renderMultiWalletView() {
      const app = document.getElementById("app");
      const d = portfolioData;
      if (!d) return;

      // Wallet panel
      let walletPanelHTML = `
        <div class="wallet-panel">
          <div class="wallet-panel-header">
            <div class="wallet-panel-title">My Wallets</div>
            <div class="wallet-panel-count">${d.walletCount} wallet${d.walletCount !== 1 ? "s" : ""}</div>
          </div>
          <div class="wallet-list">
      `;

      // "All wallets" option
      walletPanelHTML += `
        <div class="wallet-item ${activeView === "all" ? "active" : ""}" onclick="switchWalletView('all')">
          <div class="wallet-item-left">
            <div class="wallet-item-avatar" style="background: linear-gradient(135deg, var(--stellar-blue), var(--purple)); font-size: 16px;">All</div>
            <div class="wallet-item-info">
              <div class="wallet-item-label">All Wallets</div>
              <div class="wallet-item-address">${d.walletCount} addresses combined</div>
            </div>
          </div>
          <div class="wallet-item-right">
            <div class="wallet-item-value">${fmtBigUSD(d.totalValueUSD)}</div>
          </div>
        </div>
      `;

      // Individual wallets
      (d.wallets || []).forEach((w, i) => {
        const label = w.label || shortenAddr(w.address);
        const color = getWalletColor(i);
        const initials = (w.label || w.address.slice(0, 2)).slice(0, 2).toUpperCase();
        const pct = d.totalValueUSD > 0 ? ((w.totalValueUSD / d.totalValueUSD) * 100).toFixed(1) : "0";

        walletPanelHTML += `
          <div class="wallet-item ${activeView === w.address ? "active" : ""}" onclick="switchWalletView('${w.address}')">
            <div class="wallet-item-left">
              <div class="wallet-item-avatar" style="background: ${color};">${initials}</div>
              <div class="wallet-item-info">
                <div class="wallet-item-label">${label}</div>
                <div class="wallet-item-address">${shortenAddr(w.address)}</div>
              </div>
            </div>
            <div class="wallet-item-right">
              <div class="wallet-item-value">${fmtBigUSD(w.totalValueUSD)}</div>
              <div class="wallet-item-assets">${pct}% · ${w.balanceCount} assets</div>
            </div>
            <button class="wallet-item-remove" onclick="removeWalletFromPortfolio('${w.address}', event)" title="Remove wallet">×</button>
          </div>
        `;
      });

      walletPanelHTML += `</div>`; // wallet-list

      // Add wallet form
      walletPanelHTML += `
        <div class="wallet-add-form">
          <input type="text" id="walletLabelInput" placeholder="Label (optional)" style="max-width:150px" />
          <input type="text" id="walletAddInput" placeholder="Stellar address (G...)" spellcheck="false"
            onkeydown="if(event.key==='Enter')handleAddWallet()" />
          <button class="btn" onclick="handleAddWallet()">Add</button>
        </div>
      </div>`;

      // If in time-travel mode, show historical view instead of live
      if (timeTravelDate && timeTravelSnapshot) {
        app.innerHTML = walletPanelHTML;
        const ttDiv = document.createElement("div");
        ttDiv.innerHTML = buildTimeTravelBar() + renderTimeTravelContent(timeTravelSnapshot);
        app.appendChild(ttDiv);
        return;
      }

      // Now render the portfolio content based on activeView
      if (activeView === "all") {
app.innerHTML = walletPanelHTML + buildTimeTravelBar() + renderAggregatedContent(d);
        drawAllocationPieChart(d);
      } else {
        const walletData = d.wallets.find((w) => w.address === activeView);
        if (walletData) {
          // Switch to single-wallet view using existing renderPortfolio
          currentData = {
            ...walletData,
            xlmPrice: d.xlmPrice,
            subentryCount: 0,
            lastModifiedLedger: 0,
            isTracked: true,
            snapshotCount: 0,
            lastUpdated: d.lastUpdated,
          };
          historyData = null;
          claimableData = null;
          nftsData = null;
          portfolioHistory = null;
          currentTab = "tokens";

          // Render wallet panel + single wallet view
          app.innerHTML = walletPanelHTML + buildTimeTravelBar() + `<div id="singleWalletView"></div>`;
          renderSingleWalletInPanel();
        } else {
          app.innerHTML = walletPanelHTML + `<div class="empty-state">Wallet not found</div>`;
        }
      }
    }

    function renderSingleWalletInPanel() {
      const d = currentData;
      const container = document.getElementById("singleWalletView");
      if (!container || !d) return;

      const tokens = d.balances.filter((b) => b.type === "native" || b.type === "token" || b.type === "soroban_token");
      const lpShares = d.balances.filter((b) => b.type === "lp_share");
      const pricedTokens = tokens.filter((b) => b.valueUSD > 0);
      const defiPositions = d.defiPositions || [];

      container.innerHTML = `
        <div class="portfolio-header">
          <div>
            <div class="portfolio-address">${d.label ? d.label + " — " : ""}${d.address}</div>
            <div class="portfolio-value">${fmtBigUSD(d.totalValueUSD)}</div>
            <div class="portfolio-meta">
              <div class="meta-item">Assets: <span>${d.balanceCount}</span></div>
              <div class="meta-item">DeFi: <span>${defiPositions.length}</span></div>
            </div>
          </div>
          <button class="btn btn-secondary" onclick="loadMultiWalletPortfolio()">Refresh</button>
        </div>

        <div class="tabs">
          <button class="tab ${currentTab === "tokens" ? "active" : ""}" onclick="switchTab('tokens')">
            Tokens<span class="tab-count">${tokens.length}</span>
          </button>
          <button class="tab ${currentTab === "portfolio" ? "active" : ""}" onclick="switchTab('portfolio')">
            History
          </button>
          <button class="tab ${currentTab === "defi" ? "active" : ""}" onclick="switchTab('defi')">
            DeFi<span class="tab-count">${defiPositions.length}</span>
          </button>
          <button class="tab ${currentTab === "history" ? "active" : ""}" onclick="switchTab('history')">
            Transactions
          </button>
          <button class="tab ${currentTab === "claimable" ? "active" : ""}" onclick="switchTab('claimable')">
            Claimable
          </button>
          <button class="tab ${currentTab === "nfts" ? "active" : ""}" onclick="switchTab('nfts')">
            NFTs
          </button>
        </div>
        <div id="tabContent"></div>
      `;

      renderTabContent();
    }

    function renderAggregatedContent(d) {
      const balances = d.aggregatedBalances || [];
      const totalWallets = d.walletCount;
      const pricedBalances = balances.filter((b) => b.totalValueUSD > 0);

      // Breakdown bar
      let breakdownHTML = "";
      let legendHTML = "";
      if (d.totalValueUSD > 0 && pricedBalances.length > 0) {
        breakdownHTML = '<div class="breakdown-bar">';
        legendHTML = '<div class="breakdown-legend">';
        pricedBalances.forEach((b, i) => {
          const pct = (b.totalValueUSD / d.totalValueUSD) * 100;
          if (pct < 0.5) return;
          const color = getTokenColor(b.code, i);
          breakdownHTML += `<div class="breakdown-segment" style="width: ${pct}%; background: ${color};" title="${b.code}: ${fmt(pct)}%"></div>`;
          legendHTML += `<div class="legend-item"><div class="legend-dot" style="background: ${color};"></div>${b.code} ${fmt(pct)}%</div>`;
        });
        breakdownHTML += "</div>";
        legendHTML += "</div>";
      }

      // Wallet chips
      let chipsHTML = '<div class="agg-wallet-chips">';
      (d.wallets || []).forEach((w, i) => {
        const label = w.label || shortenAddr(w.address);
        const color = getWalletColor(i);
        chipsHTML += `
          <div class="agg-chip" onclick="switchWalletView('${w.address}')">
            <div class="agg-chip-dot" style="background: ${color.replace("linear-gradient(135deg, ", "").split(",")[0]};"></div>
            ${label}: ${fmtUSD(w.totalValueUSD)}
          </div>
        `;
      });
      chipsHTML += "</div>";

      // Aggregated token table
      let tokenHTML = "";
      if (balances.length > 0) {
        tokenHTML = `
          <div style="margin-top:32px">
            <h3 style="font-size:16px; font-weight:700; margin-bottom:16px;">Combined Holdings</h3>
            <div class="token-list">
              <div class="token-row token-row-header">
                <div>Asset</div>
                <div style="text-align:right">Total Balance</div>
                <div style="text-align:right" class="price-col">Price</div>
                <div style="text-align:right">Total Value</div>
              </div>
        `;

        balances.forEach((b) => {
          const iconClass = b.code === "XLM" ? "xlm" : (b.code === "USDC" || b.code === "yUSDC") ? "usdc" : "default";
          const initials = b.code.slice(0, 2);
          const issuerShort = b.issuer ? shortenAddr(b.issuer) : "Native";
          const priceStr = b.price ? "$" + fmt(b.price.usd, b.price.usd < 0.01 ? 6 : 4) : "";
          const valueStr = b.totalValueUSD > 0 ? fmtUSD(b.totalValueUSD) : '<span class="unpriced">No price</span>';
          const walletCountStr = b.wallets ? `${b.wallets.length} wallet${b.wallets.length > 1 ? "s" : ""}` : "";

          tokenHTML += `
            <div class="token-row">
              <div class="token-info">
                <div class="token-icon ${iconClass}">${initials}</div>
                <div>
                  <div class="token-name">${b.code}</div>
                  <div class="token-issuer">${issuerShort} · ${walletCountStr}</div>
                </div>
              </div>
              <div class="token-balance">${fmt(b.totalBalance, b.totalBalance < 1 ? 7 : 2)}</div>
              <div class="token-price">${priceStr}</div>
              <div class="token-value">${valueStr}</div>
            </div>
          `;
        });

        tokenHTML += "</div></div>";
      }

      return `
        <div class="agg-header">
          <div class="agg-subtitle">${totalWallets} wallet${totalWallets !== 1 ? "s" : ""} · ${currentNetwork}</div>
          <div class="agg-total">${fmtBigUSD(d.totalValueUSD)}</div>
          ${chipsHTML}
        </div>

        ${breakdownHTML}
        ${legendHTML}

        <div class="pie-chart-section">
          <div class="pie-canvas-wrap">
            <canvas id="allocationPieCanvas" width="200" height="200" style="width:200px;height:200px;"></canvas>
          </div>
          <div style="flex:1;min-width:0;">
            <h3>Portfolio by Wallet</h3>
            <div class="pie-legend" id="pieLegend"></div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Wallets</div>
            <div class="stat-value">${totalWallets}</div>
            <div class="stat-sub">${currentNetwork}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">XLM Price</div>
            <div class="stat-value">$${fmt(d.xlmPrice?.usd || 0, 4)}</div>
            <div class="stat-sub" style="color: ${(d.xlmPrice?.change24h || 0) >= 0 ? "var(--green)" : "var(--red)"}">
              ${(d.xlmPrice?.change24h || 0) >= 0 ? "+" : ""}${fmt(d.xlmPrice?.change24h || 0)}%
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Unique Assets</div>
            <div class="stat-value">${balances.length}</div>
            <div class="stat-sub">${pricedBalances.length} priced</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total DeFi</div>
            <div class="stat-value">${(d.wallets || []).reduce((sum, w) => sum + (w.defiPositions?.length || 0), 0)}</div>
            <div class="stat-sub">across all wallets</div>
          </div>
        </div>

        ${tokenHTML}
      `;
    }

    function drawAllocationPieChart(d) {
      const canvas = document.getElementById("allocationPieCanvas");
      if (!canvas) return;
      const wallets = (d.wallets || []).filter((w) => w.totalValueUSD > 0);
      if (wallets.length === 0) return;

      const dpr = window.devicePixelRatio || 1;
      const size = 200;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + "px";
      canvas.style.height = size + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      const cx = size / 2;
      const cy = size / 2;
      const outerR = size / 2 - 6;
      const innerR = outerR * 0.56;
      const BG = "#1a2332"; // --bg-card

      const total = wallets.reduce((s, w) => s + w.totalValueUSD, 0);
      const colors = wallets.map((_, i) => {
        const grad = getWalletColor(i);
        return grad.replace("linear-gradient(135deg, ", "").split(",")[0].trim();
      });

      function drawSlices(highlightIdx) {
        ctx.clearRect(0, 0, size, size);
        let start = -Math.PI / 2;
        wallets.forEach((w, i) => {
          const sweep = (w.totalValueUSD / total) * 2 * Math.PI;
          ctx.save();
          if (i === highlightIdx) {
            const mid = start + sweep / 2;
            ctx.translate(Math.cos(mid) * 7, Math.sin(mid) * 7);
          }
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, outerR, start, start + sweep);
          ctx.closePath();
          ctx.fillStyle = colors[i];
          ctx.fill();
          ctx.restore();
          start += sweep;
        });

        // Donut hole
        ctx.beginPath();
        ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
        ctx.fillStyle = BG;
        ctx.fill();

        // Center label
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        if (highlightIdx >= 0) {
          const w = wallets[highlightIdx];
          ctx.fillStyle = "#e2e8f0";
          ctx.font = `bold 13px -apple-system, sans-serif`;
          ctx.fillText(fmtUSD(w.totalValueUSD), cx, cy - 9);
          ctx.fillStyle = "#64748b";
          ctx.font = `12px -apple-system, sans-serif`;
          ctx.fillText(((w.totalValueUSD / total) * 100).toFixed(1) + "%", cx, cy + 9);
        } else {
          ctx.fillStyle = "#e2e8f0";
          ctx.font = `bold 13px -apple-system, sans-serif`;
          ctx.fillText(fmtBigUSD(total), cx, cy - 9);
          ctx.fillStyle = "#64748b";
          ctx.font = `12px -apple-system, sans-serif`;
          ctx.fillText("Total", cx, cy + 9);
        }

        // Update legend opacity
        document.querySelectorAll(".pie-legend-item").forEach((el, i) => {
          el.style.opacity = highlightIdx < 0 || i === highlightIdx ? "1" : "0.35";
        });
      }

      function sliceAt(mx, my) {
        const dx = mx - cx;
        const dy = my - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < innerR || dist > outerR) return -1;
        let angle = Math.atan2(dy, dx) + Math.PI / 2;
        if (angle < 0) angle += 2 * Math.PI;
        let cum = 0;
        for (let i = 0; i < wallets.length; i++) {
          cum += (wallets[i].totalValueUSD / total) * 2 * Math.PI;
          if (angle <= cum) return i;
        }
        return -1;
      }

      // Build legend
      const legendEl = document.getElementById("pieLegend");
      if (legendEl) {
        legendEl.innerHTML = wallets.map((w, i) => {
          const pct = ((w.totalValueUSD / total) * 100).toFixed(1);
          const label = w.label || shortenAddr(w.address);
          return `<div class="pie-legend-item" data-idx="${i}" onclick="switchWalletView('${w.address}')">
            <div class="pie-legend-dot" style="background:${colors[i]};"></div>
            <span class="pie-legend-label" title="${w.label || w.address}">${label}</span>
            <span class="pie-legend-value">${fmtUSD(w.totalValueUSD)}</span>
            <span class="pie-legend-pct">${pct}%</span>
          </div>`;
        }).join("");
      }

      drawSlices(-1);

      let hovered = -1;
      canvas.addEventListener("mousemove", (e) => {
        const r = canvas.getBoundingClientRect();
        const scaleX = size / r.width;
        const scaleY = size / r.height;
        const idx = sliceAt((e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY);
        if (idx !== hovered) {
          hovered = idx;
          canvas.style.cursor = idx >= 0 ? "pointer" : "default";
          drawSlices(idx);
        }
      });
      canvas.addEventListener("mouseleave", () => {
        hovered = -1;
        canvas.style.cursor = "default";
        drawSlices(-1);
      });
      canvas.addEventListener("click", (e) => {
        const r = canvas.getBoundingClientRect();
        const scaleX = size / r.width;
        const scaleY = size / r.height;
        const idx = sliceAt((e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY);
        if (idx >= 0) switchWalletView(wallets[idx].address);
      });
    }

    // ── Helpers ────────────────────────────────────────────────
    function fmt(n, decimals = 2) {
      if (n === null || n === undefined) return "—";
      return new Intl.NumberFormat("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      }).format(n);
    }

    function fmtUSD(n) {
      if (n === null || n === undefined) return "—";
      if (n >= 1_000_000) return "$" + fmt(n / 1_000_000) + "M";
      if (n >= 1_000) return "$" + fmt(n / 1_000) + "K";
      return "$" + fmt(n);
    }

    function fmtBigUSD(n) {
      return "$" + fmt(n);
    }

    function shortenAddr(addr) {
      if (!addr) return "";
      return addr.slice(0, 6) + "..." + addr.slice(-4);
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins + "m ago";
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + "h ago";
      const days = Math.floor(hours / 24);
      return days + "d ago";
    }

    // ── Time Travel ──────────────────────────────────────────
    function buildTimeTravelBar() {
      const nowLocal = new Date();
      nowLocal.setMinutes(nowLocal.getMinutes() - nowLocal.getTimezoneOffset());
      const maxDate = nowLocal.toISOString().slice(0, 16);

      const badge = timeTravelDate
        ? `<span class="time-travel-badge historical">Historical</span>`
        : `<span class="time-travel-badge live">Live</span>`;

      const info = timeTravelSnapshot
        ? `<span class="time-travel-info">Showing snapshot from ${new Date(timeTravelSnapshot.snapshotDate).toLocaleString()}</span>`
        : "";

      const backBtn = timeTravelDate
        ? `<button class="btn-sm btn-back-to-live" onclick="backToLive()">Back to Live</button>`
        : "";

      return `
        <div class="time-travel-bar">
          ${badge}
          <label>View balances at:</label>
          <input type="datetime-local" id="timeTravelInput" max="${maxDate}"
            value="${timeTravelDate || ""}" />
          <button class="btn-sm btn-go" onclick="goToDate()">Go</button>
          ${backBtn}
          ${info}
        </div>
      `;
    }

    async function goToDate() {
      const input = document.getElementById("timeTravelInput");
      if (!input || !input.value) return;

      const isoDate = new Date(input.value).toISOString();

      // Determine which address to query
      let address;
      if (multiWalletMode) {
        address = activeView !== "all" ? activeView : (walletList[0]?.address || null);
      } else {
        address = currentData?.address || currentAddress;
      }

      if (!address) {
        alert("Select a specific wallet first (time travel works per-wallet).");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/v1/account/${address}/snapshot-at?date=${encodeURIComponent(isoDate)}`);
        const data = await res.json();

        if (!data.found) {
          alert("No snapshots found for this wallet yet. Snapshots are recorded after you add the wallet and the scheduler runs.");
          return;
        }

        timeTravelDate = input.value;
        timeTravelSnapshot = data;

        if (multiWalletMode) {
          renderMultiWalletView();
        } else {
          const app = document.getElementById("app");
          app.innerHTML = buildTimeTravelBar() + renderTimeTravelContent(data);
        }
      } catch (e) {
        console.error("Time travel error:", e);
        alert("Failed to fetch historical snapshot.");
      }
    }

    function backToLive() {
      timeTravelDate = null;
      timeTravelSnapshot = null;
      if (multiWalletMode) {
        renderMultiWalletView();
      } else {
        renderPortfolio();
      }
    }

    function renderTimeTravelContent(snap) {
      const tokensHTML = snap.tokens.length > 0
        ? snap.tokens.map(t => `
          <div class="token-row">
            <div class="token-info">
              <div class="token-icon">${(t.asset || "?")[0]}</div>
              <div>
                <div class="token-name">${t.asset}</div>
                <div class="token-balance">${fmt(t.balance, 4)}</div>
              </div>
            </div>
            <div class="token-value">
              <div>${t.valueUSD > 0 ? fmtUSD(t.valueUSD) : '<span class="unpriced">No price</span>'}</div>
              ${t.priceUSD > 0 ? `<div class="token-price">$${fmt(t.priceUSD, 4)}</div>` : ""}
            </div>
          </div>
        `).join("")
        : `<div style="text-align:center; color: var(--text-muted); padding: 40px;">No token data in this snapshot</div>`;

      return `
        <div class="portfolio-header">
          <div>
            <div class="portfolio-address">${snap.address}</div>
            <div class="portfolio-value">${fmtBigUSD(snap.totalValueUSD)}</div>
            <div class="portfolio-meta">
              <div class="meta-item">Assets: <span>${snap.tokenCount}</span></div>
              <div class="meta-item">DeFi: <span>${snap.defiPositionCount}</span></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">Balances at ${new Date(snap.snapshotDate).toLocaleString()}</div>
          ${tokensHTML}
        </div>
      `;
    }

    function getTokenColor(code, i) {
      const colors = ["#6366f1", "#3b82f6", "#22c55e", "#eab308", "#ef4444", "#a855f7", "#f97316", "#14b8a6", "#ec4899", "#8b5cf6"];
      if (code === "XLM") return "#4c6ef5";
      if (code === "USDC") return "#2775ca";
      return colors[i % colors.length];
    }

    function getIconClass(code, type) {
      if (type === "native") return "xlm";
      if (code === "USDC" || code === "yUSDC") return "usdc";
      if (type === "lp_share") return "lp";
      return "default";
    }

    // ── Load Portfolio ────────────────────────────────────────
    async function loadPortfolio() {
      const input = document.getElementById("addressInput");
      const address = input.value.trim();
      if (!address) return;

      const app = document.getElementById("app");
      app.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div style="color: var(--text-secondary);">Loading portfolio...</div>
          <div style="color: var(--text-muted); font-size: 13px; margin-top: 8px;">${shortenAddr(address)}</div>
        </div>
      `;

      try {
        const res = await fetch(`${API_BASE}/api/v1/account/${address}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Failed to load account");
        }
        currentData = await res.json();
        historyData = null;
        claimableData = null;
        nftsData = null;
        portfolioHistory = null;
        currentTab = "tokens";
        renderPortfolio();
      } catch (e) {
        app.innerHTML = `
          <div class="error-banner">${e.message}</div>
          <div class="welcome" style="padding-top: 40px;">
            <p>Check the address and try again.</p>
          </div>
        `;
      }
    }

    function loadExample(addr) {
      document.getElementById("addressInput").value = addr;
      loadPortfolio();
    }

    // Enter key trigger
    document.getElementById("addressInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadPortfolio();
    });

    // ── Render Portfolio ──────────────────────────────────────
    function renderPortfolio() {
      const d = currentData;
      const app = document.getElementById("app");

      const sorobanTokens = d.balances.filter((b) => b.type === "soroban_token");

      // Build breakdown bar
      let breakdownHTML = "";
      let legendHTML = "";
      if (d.totalValueUSD > 0) {
        breakdownHTML = '<div class="breakdown-bar">';
        legendHTML = '<div class="breakdown-legend">';
        pricedTokens.forEach((b, i) => {
          const pct = (b.valueUSD / d.totalValueUSD) * 100;
          if (pct < 0.5) return;
          const code = b.asset.code;
          const color = getTokenColor(code, i);
          breakdownHTML += `<div class="breakdown-segment" style="width: ${pct}%; background: ${color};" title="${code}: ${fmt(pct)}%"></div>`;
          legendHTML += `<div class="legend-item"><div class="legend-dot" style="background: ${color};"></div>${code} ${fmt(pct)}%</div>`;
        });
        breakdownHTML += "</div>";
        legendHTML += "</div>";
      }

      // XLM stats
      const xlmBal = d.balances.find((b) => b.type === "native");

      app.innerHTML = `
        ${buildTimeTravelBar()}
        <div class="portfolio-header">
          <div>
            <div class="portfolio-address">${d.address}</div>
            <div class="portfolio-value">${fmtBigUSD(d.totalValueUSD)}</div>
            <div class="portfolio-change ${d.xlmPrice.change24h >= 0 ? "positive" : "negative"}">
              XLM ${d.xlmPrice.change24h >= 0 ? "+" : ""}${fmt(d.xlmPrice.change24h)}% (24h)
            </div>
            <div class="portfolio-meta">
              <div class="meta-item">Assets: <span>${d.balanceCount}</span></div>
              <div class="meta-item">Subentries: <span>${d.subentryCount}</span></div>
              <div class="meta-item">Updated: <span>${timeAgo(d.lastUpdated)}</span></div>
            </div>
          </div>
          <button class="btn btn-secondary" onclick="loadPortfolio()">Refresh</button>
        </div>

        ${breakdownHTML}
        ${legendHTML}

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">XLM Balance</div>
            <div class="stat-value">${xlmBal ? fmt(parseFloat(xlmBal.balance), 2) : "0"}</div>
            <div class="stat-sub">Available: ${xlmBal ? xlmBal.available : "0"}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">XLM Price</div>
            <div class="stat-value">$${fmt(d.xlmPrice.usd, 4)}</div>
            <div class="stat-sub" style="color: ${d.xlmPrice.change24h >= 0 ? "var(--green)" : "var(--red)"}">
              ${d.xlmPrice.change24h >= 0 ? "+" : ""}${fmt(d.xlmPrice.change24h)}%
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Token Types</div>
            <div class="stat-value">${tokens.length}</div>
            <div class="stat-sub">${pricedTokens.length} priced</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">LP / DeFi</div>
            <div class="stat-value">${lpShares.length + defiPositions.length}</div>
            <div class="stat-sub">${lpShares.length} classic LP${defiPositions.length ? `, ${defiPositions.length} Soroban` : ""}</div>

          <div class="stat-card">
            <div class="stat-label">Soroban Tokens</div>
